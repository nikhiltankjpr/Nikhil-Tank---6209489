<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Info Form</title>
</head>
<body>
    <h2>Use this form for info update</h2>
    
    <form name="update info">
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" required>
        <br><br>
        
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" required>
        <br><br>
        
        <label for="favSport">Favorite Sport:</label>
        <select id="favSport" name="favSport" required>
            <option value="">-- Select Sport --</option>
            <option value="football">Football</option>
            <option value="basketball">Basketball</option>
            <option value="soccer">Soccer</option>
            <option value="tennis">Tennis</option>
        </select>
        <br><br>
        
        <label>Gender:</label>
        <input type="radio" name="gender" value="male" required> Male
        <input type="radio" name="gender" value="female" required> Female
        <br><br>
        
        <input type="checkbox" id="ageCheck" name="ageCheck" required>
        <label for="ageCheck">I am 21 or older</label>
        <br><br>
        
        <label>Car Models Owned:</label>
        <input type="checkbox" name="carModels" value="msq"> MSQ
        <input type="checkbox" name="carModels" value="ford"> Ford
        <input type="checkbox" name="carModels" value="chrysler"> Chrysler
        <input type="checkbox" name="carModels" value="toyota"> Toyota
        <input type="checkbox" name="carModels" value="nissan"> Nissan
        <br><br>
        
        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
